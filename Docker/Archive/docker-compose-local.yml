services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourPassword123!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  api:
    build: .                              # Build from Dockerfile in current directory
    ports:
      - "5000:8080"                       # Map host port 5000 to container port 8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=VotingPollDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=True
    depends_on:
      - sqlserver                         # Start SQL Server before the API

volumes:
  sqlserver-data: