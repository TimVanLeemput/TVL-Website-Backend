services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: TVL-Website-Backend-SQL-Server
    environment:
      MSSQL_SA_PASSWORD: "YourPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./init-sql:/init-sql
    entrypoint: /bin/bash /init-sql/entrypoint.sh

volumes:

  sqlserver_data:
